<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IndVestor AI — Login</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060d1a;--surface:#0d1b2e;--card:#111e30;--green:#00d4aa;--gold:#f59e0b;--red:#ef4444;--blue:#1a6cff;--text:#e2eaf4;--muted:#5a7a99;--border:#1e3050;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,212,170,.06),transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(26,108,255,.06),transparent 60%)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.logo-area{text-align:center;margin-bottom:32px}
.logo{font-family:'Rajdhani',sans-serif;font-size:42px;font-weight:700;letter-spacing:-1px}
.logo span{color:var(--green)}
.logo-tag{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.card-title{font-size:18px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:'Poppins',sans-serif}
.field input:focus,.field select:focus{border-color:var(--green)}
.field input::placeholder{color:var(--muted)}
.field select option{background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;background:linear-gradient(90deg,var(--green),#00b894);border:none;border-radius:10px;color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s;font-family:'Poppins',sans-serif}
.btn:hover{opacity:.9}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.divider span{background:var(--surface);padding:0 12px;position:relative}
.disclaimer{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}
.err{color:var(--red);font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
  <div class="logo-area">
    <div class="logo">Ind<span>Vestor</span> AI</div>
    <div class="logo-tag">Intelligence Layer for Indian Markets</div>
  </div>
  <div class="card">
    <div class="card-title">Create your account</div>
    <div class="card-sub">Free access · No credit card needed</div>
    <div class="row2">
      <div class="field"><label>First Name</label><input type="text" id="fname" placeholder="First Name"/></div>
      <div class="field"><label>Last Name</label><input type="text" id="lname" placeholder="Last Name"/></div>
    </div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="Email Address"/></div>
    <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="Phone Number"/></div>
    <div class="row2">
      <div class="field"><label>Experience</label>
        <select id="exp">
          <option value="">Select</option>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
          <option>Professional</option>
        </select>
      </div>
      <div class="field"><label>Investment Style</label>
        <select id="style">
          <option value="">Select</option>
          <option>Long Term</option>
          <option>Swing Trading</option>
          <option>Day Trading</option>
          <option>Mutual Funds</option>
        </select>
      </div>
    </div>
    <div class="err" id="err">Please fill in all fields.</div>
    <button class="btn" onclick="login()">Get Started →</button>
    <div class="disclaimer">By continuing you agree to our Terms of Service. Your data is stored locally and never shared.</div>
  </div>
</div>
<script>
function login(){
  var fname=document.getElementById('fname').value.trim();
  var lname=document.getElementById('lname').value.trim();
  var email=document.getElementById('email').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var exp=document.getElementById('exp').value;
  var style=document.getElementById('style').value;
  var err=document.getElementById('err');
  if(!fname||!lname||!email||!phone||!exp||!style){err.style.display='block';return;}
  err.style.display='none';
  localStorage.setItem('iv_user',JSON.stringify({fname,lname,email,phone,exp,style,initials:(fname[0]+lname[0]).toUpperCase()}));
  window.location.href='index.html';
}
document.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',function(e){if(e.key==='Enter')login();}));
// If already logged in skip login
if(localStorage.getItem('iv_user')) window.location.href='index.html';
</script>
</body>
</html>
